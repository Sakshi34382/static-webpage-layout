<!DOCTYPE html>
<html>

<head>
    <title>Simple Webpage</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
        }

        header {
            background: rgb(255, 0, 183);
            color: white;
            padding: 20px;
            text-align: center;
        }

        nav {
            background: lightgray;
            padding: 10px;
            text-align: center;
        }

        nav a {
            margin: 10px;
            text-decoration: none;
            color: black;
        }

        main {
            padding: 20px;
        }

        section {
            background: whitesmoke;
            padding: 20px;
            margin-bottom: 20px;
        }

        footer {
            background: black;
            color: white;
            text-align: center;
            padding: 15px;
        }

        @media (max-width: 600px) {
            nav a {
                display: block;
                margin: 10px 0;
            }

            body {
                font-size: 14px;
            }
        }
    </style>
</head>

<body>

    <header>
        <h1>My Website</h1>
    </header>

    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>

    <main>

        <section>
            <h2>Welcome</h2>
            <p>This is a simple webpage layout.</p>
        </section>

        <section>
            <h2>About</h2>
            <p>This page uses HTML and CSS.</p>
        </section>

    </main>

    <footer>
        <p>My Website</p>
    </footer>

</body>

</html>
